# AI 漫剧创作平台 — 配置中心
# 覆盖顺序: 环境变量 > config.yaml > 默认值

engine:
  # 图片生成引擎: "comfyui" | "mock" | "tongyi"
  image_provider: "mock"
  # 视频生成引擎: "comfyui" | "mock"
  video_provider: "mock"
  # LLM引擎: "deepseek" | "ollama" | "mock"
  llm_provider: "mock"

comfyui:
  server_addr: "127.0.0.1"
  server_port: 18188
  use_https: false
  timeout: 300
  # GPU SSH 配置（ComfyUI 直接时不需要）
  gpu_host: "root@connect.bjb2.seetacloud.com"
  gpu_port: 30476
  gpu_pass: "900917_19871002-Gz"
  gpu_output_dir: "/root/ComfyUI/output"

deepseek:
  api_key: ""  # 优先环境变量 DEEPSEEK_API_KEY
  model: "deepseek-chat"

ollama:
  server_url: "http://localhost:11434"
  model: "qwen3:14b"

tongyi:
  api_key: ""  # 优先环境变量 TONGYI_API_KEY
  model: "wanx2.1-t2i-plus"

storage:
  checkpoint_dir: "storage/checkpoints/"
  output_dir: "storage/output/"
  images_dir: "storage/images/"
  frames_dir: "storage/frames_tmp/"

pipeline:
  max_retries: 3
  retry_delay: 2.0  # 秒
  review_enabled: true
  default_model: "deepseek-chat"

frontend:
  host: "127.0.0.1"
  port: 8000
  debug: true
